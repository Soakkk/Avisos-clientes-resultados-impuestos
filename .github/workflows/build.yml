name: Pruebas y ejecutable Windows

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Comprobar TypeScript
        run: npm run lint
      - name: Compilar aplicación web
        run: npm run build

  build:
    needs: tests
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Compilar instalador NSIS
        run: npm run electron:build
      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Generador-Avisos-Fiscales-Setup
          path: |
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.blockmap
      - name: Publicar release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.blockmap
          generate_release_notes: true
